name: 週次ライバル観測

on:
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Prepare data dir
        run: mkdir -p data

      - name: Run collection
        run: python collect.py
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}

      - name: Commit results
        run: |
          git config user.name "RivalWatch Bot"
          git config user.email "bot@rivalwatch"
          git add data/
          git diff --staged --quiet || git commit -m "週次観測 $(date '+%Y/%m/%d')"
          git pull --rebase origin main
          git push
