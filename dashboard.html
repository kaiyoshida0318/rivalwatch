{
  "message": "Not Found",
  "documentation_url": "https://docs.github.com/rest/git/blobs#get-a-blob",
  "status": "404"
}
<script>
// loadFromGitHubラッパー: localStorageを「正」として削除済みURLが復活しないよう修正
(function() {
  var _allLFGWrappers = window.loadFromGitHub;
  if (!_allLFGWrappers) return;
  window.loadFromGitHub = async function() {
    // 実行前のlocalStorageのURL一覧を保持
    var localCfg = loadRankingConfigs ? loadRankingConfigs() : [];
    var localUrls = localCfg.map(function(r){ return r.url; });
    // 元の関数を実行
    await _allLFGWrappers.apply(this, arguments);
    // localStorageにないURLをsavedRankingsから除去（削除済みURLの復活防止）
    if (localUrls.length > 0 && savedRankings) {
      for (var i = savedRankings.length - 1; i >= 0; i--) {
        if (localUrls.indexOf(savedRankings[i].url) < 0) {
          savedRankings.splice(i, 1);
        }
      }
      if (saveRankingConfigs) saveRankingConfigs(savedRankings);
    }
  };
})();
</script>
